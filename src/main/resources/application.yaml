spring:
  application:
    name: purchase
  datasource:
    url: jdbc:h2:mem:purchase;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  error:
    include-stacktrace: never
    include-exception: false
    include-message: never

purchase:
  treasury:
    base-url: https://api.fiscaldata.treasury.gov
